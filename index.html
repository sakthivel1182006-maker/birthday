<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Background Music -->
<audio id="music" loop>
<source src="music.mp3" type="audio/mp3">
</audio>

<div class="container">

<h1 id="title">🎉 Happy Birthday Yamini 🎉</h1>

<p id="quote">
May your birthday bring happiness, success and unforgettable memories!
</p>

<div id="countdown"></div>

<!-- Photo Slideshow -->
<div class="slideshow">

<img src="photo1.jpg" class="slide">
<img src="photo2.jpg" class="slide">
<img src="photo3.jpg" class="slide">
<img src="photo4.jpg" class="slide">

</div>

<button onclick="startBirthday()">Start Celebration 🎂</button>

<h2 id="wish"></h2>

</div>

<canvas id="confetti"></canvas>

<script src="script.js"></script>

</body>
</html>
